<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Marker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      gap: 24px;
      padding: 32px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 13px;
      color: #666;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }
    .marker-wrap {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    /* Hiro marker - SVG ile çizilmiş, dış bağımlılık yok */
    .marker-wrap img {
      width: 260px;
      height: 260px;
      display: block;
      image-rendering: pixelated;
    }
    .badge {
      background: #111;
      color: white;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 5px 14px;
      border-radius: 50px;
      text-transform: uppercase;
    }
    .tip {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 12px;
      color: #7c5a00;
      line-height: 1.6;
      max-width: 280px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>AR Marker — Hiro</h1>
  <p>Bu görseli ekranda tam görünür şekilde tut veya yazdır. Kamerayı buraya yönelt.</p>

  <div class="marker-wrap">
    <!-- Hiro marker — base64 gömülü, internet bağlantısı gerekmez -->
    <svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
      <!-- Dış beyaz kenar -->
      <rect width="260" height="260" fill="white"/>
      <!-- Siyah dış çerçeve -->
      <rect x="10" y="10" width="240" height="240" fill="black"/>
      <!-- İç beyaz alan -->
      <rect x="30" y="30" width="200" height="200" fill="white"/>
      <!-- Hiro pattern - H harfi benzeri iç desen -->
      <!-- Sol dikey çubuk -->
      <rect x="50" y="55" width="35" height="150" fill="black"/>
      <!-- Sağ dikey çubuk -->
      <rect x="175" y="55" width="35" height="150" fill="black"/>
      <!-- Orta yatay çubuk -->
      <rect x="50" y="118" width="160" height="24" fill="black"/>
      <!-- Alt süsleme çizgisi -->
      <rect x="85" y="185" width="90" height="20" fill="black"/>
      <!-- Üst süsleme çizgisi -->
      <rect x="85" y="55" width="90" height="20" fill="black"/>
    </svg>

    <div class="badge">Hiro Marker</div>
  </div>

  <div class="tip">
    💡 Marker en az <strong>10×10 cm</strong> görünür olmalı.<br>
    Düz bir yüzeyde, iyi aydınlatılmış ortamda tut.
  </div>

</body>
</html>
