<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Masal AR</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Segoe UI', sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at top, #1a1040 0%, #0a0a12 70%);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 24px; padding: 32px;
    }
    .book-icon { font-size: 56px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    #splash h1 { color: #fff; font-size: 26px; font-weight: 700; text-align: center; }
    #splash p { color: rgba(255,255,255,0.55); font-size: 14px; text-align: center; line-height: 1.7; max-width: 280px; }
    #start-btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff; border: none; border-radius: 50px;
      padding: 16px 44px; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 8px 32px rgba(124,58,237,0.35);
      transition: transform 0.15s;
    }
    #start-btn:active { transform: scale(0.96); }

    #hud {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 100; display: none;
    }
    #hud .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 18px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      display: flex; align-items: center; gap: 10px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #hud .top-bar span { color: #fff; font-size: 13px; font-weight: 500; }

    #hint {
      position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.85); font-size: 13px;
      padding: 10px 22px; border-radius: 50px; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #playing-badge {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(124,58,237,0.9); color: #fff;
      font-size: 13px; font-weight: 600; padding: 8px 22px;
      border-radius: 50px; display: none; white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="book-icon">📖</div>
    <h1>Masalı Hayata Geçir</h1>
    <p>Kitabın son sayfasını kameraya göster — video canlanacak!</p>
    <button id="start-btn" onclick="startAR()">✨ Başlat</button>
  </div>

  <div id="hud">
    <div class="top-bar">
      <div class="dot"></div>
      <span>AR Aktif — Son sayfayı göster</span>
    </div>
    <div id="playing-badge">▶ Video Oynatılıyor</div>
    <div id="hint">📖 Kitabın son sayfasını kameraya tut</div>
  </div>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    style="display:none;">

    <a-assets>
      <video id="ar-video"
        src="video.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
      <a-plane
        src="#ar-video"
        width="1"
        height="0.5625"
        position="0 0 0"
        rotation="0 0 0"
        material="side: double; shader: flat;">
      </a-plane>
    </a-entity>

  </a-scene>

  <script>
    function startAR() {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('ar-scene').style.display = 'block';
      document.getElementById('hud').style.display = 'block';

      const video = document.getElementById('ar-video');
      const targetEntity = document.getElementById('target-entity');
      const playingBadge = document.getElementById('playing-badge');

      targetEntity.addEventListener('targetFound', () => {
        video.play().catch(() => {});
        playingBadge.style.display = 'block';
      });

      targetEntity.addEventListener('targetLost', () => {
        video.pause();
        playingBadge.style.display = 'none';
      });
    }
  </script>

</body>
</html>
