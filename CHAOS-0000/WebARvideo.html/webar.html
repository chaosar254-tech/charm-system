<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR Video</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* --- Başlangıç Ekranı --- */
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 28px;
      padding: 32px;
    }

    #splash .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    #splash h1 {
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
    }

    #splash p {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      text-align: center;
      line-height: 1.6;
      max-width: 300px;
    }

    #splash .marker-preview {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #splash .marker-preview img {
      width: 160px;
      height: 160px;
    }

    #splash .marker-preview span {
      font-size: 12px;
      color: #555;
      font-weight: 500;
    }

    #start-btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.15s, opacity 0.15s;
    }

    #start-btn:hover { opacity: 0.9; transform: scale(1.02); }
    #start-btn:active { transform: scale(0.97); }

    /* --- AR Sahnesi --- */
    a-scene {
      position: fixed;
      inset: 0;
    }

    /* --- HUD Overlay --- */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      display: none;
    }

    #hud .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 18px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #hud .top-bar .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    #hud .top-bar span {
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    #hud .hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 50px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.15);
      animation: fadeinout 3s ease-in-out forwards;
    }

    #marker-status {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(124, 58, 237, 0.85);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 50px;
      display: none;
      white-space: nowrap;
    }

    /* --- Crosshair --- */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
    }

    #crosshair svg {
      width: 100%; height: 100%;
      animation: rotate 8s linear infinite;
    }

    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes fadeinout {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- BAŞLANGIÇ EKRANI -->
  <div id="splash">
    <div class="logo">📷</div>
    <h1>WebAR Video</h1>
    <p>Kameranı aşağıdaki marker görseline tut — üzerinde video otomatik oynar.</p>

    <div class="marker-preview">
      <!-- AR.js standart Hiro markeri (siyah beyaz kare) -->
      <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
           alt="Hiro Marker"
           onerror="this.style.display='none'; document.getElementById('marker-fallback').style.display='block'">
      <div id="marker-fallback" style="display:none; width:160px; height:160px; background:#111; border-radius:8px; display:none; flex-direction:column; align-items:center; justify-content:center; gap:8px;">
        <svg viewBox="0 0 100 100" width="120" height="120">
          <rect x="0" y="0" width="100" height="100" fill="white"/>
          <rect x="10" y="10" width="80" height="80" fill="black"/>
          <rect x="20" y="20" width="60" height="60" fill="white"/>
          <rect x="30" y="25" width="10" height="50" fill="black"/>
          <rect x="50" y="25" width="10" height="50" fill="black"/>
          <rect x="25" y="40" width="50" height="10" fill="black"/>
        </svg>
      </div>
      <span>Bu görseli yazdır veya ekranda göster</span>
    </div>

    <button id="start-btn" onclick="startAR()">📹 Kamerayı Başlat</button>
  </div>

  <!-- HUD (AR aktifken görünür) -->
  <div id="hud">
    <div class="top-bar">
      <div class="dot"></div>
      <span>AR Aktif — Markere bak</span>
    </div>

    <div id="crosshair">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="4 4"/>
        <line x1="30" y1="2" x2="30" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="30" y1="46" x2="30" y2="58" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="30" x2="14" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="46" y1="30" x2="58" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div id="marker-status">▶ Video Oynatılıyor</div>
    <div class="hint">📎 Markeri kamera görüşüne getir</div>
  </div>

  <!-- A-FRAME AR SAHNESİ -->
  <a-scene id="ar-scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    style="display:none;">

    <a-assets>
      <!--
        ============================================================
        VİDEO KAYNAĞINI BURAYA DEĞİŞTİR:
        src="senin_videon.mp4"  ← kendi video dosyanın yolunu yaz
        ============================================================
      -->
      <video id="ar-video"
        src="video.mp4"
        preload="auto"
        loop="true"
        muted="true"
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <!--
      ============================================================
      MARKER TÜRÜ:
        preset="hiro"  → standart Hiro markeri (varsayılan)
        preset="kanji" → alternatif marker
        type="pattern" pattern="./marker.patt" → özel marker (bkz. README)
      ============================================================
    -->
    <a-marker preset="hiro"
      id="my-marker"
      emitevents="true"
      cursor="fuse: false">

      <!-- Video düzlemi — markerın üzerinde yüzer -->
      <a-video
        id="ar-video-plane"
        src="#ar-video"
        width="1.78"
        height="1.0"
        position="0 0.01 0"
        rotation="-90 0 0"
        material="side: double">
      </a-video>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const video = document.getElementById('ar-video');
    const videoPlane = document.getElementById('ar-video-plane');
    const marker = document.getElementById('my-marker');
    const markerStatus = document.getElementById('marker-status');

    function startAR() {
      // Kamera iznini tetikle
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(() => {
          document.getElementById('splash').style.display = 'none';
          document.getElementById('ar-scene').style.display = 'block';
          document.getElementById('hud').style.display = 'block';
        })
        .catch(err => {
          alert('Kamera izni gerekli! Lütfen tarayıcı ayarlarından izin ver.\n\n' + err.message);
        });
    }

    // Marker bulundu → videoyu oynat
    if (marker) {
      marker.addEventListener('markerFound', () => {
        video.play().catch(() => {});
        markerStatus.style.display = 'block';
      });

      // Marker kayboldu → videoyu durdur
      marker.addEventListener('markerLost', () => {
        video.pause();
        markerStatus.style.display = 'none';
      });
    }

    // Mobil dokunuş desteği — video otomatik başlamıyorsa
    document.addEventListener('click', () => {
      if (!video.paused) return;
      if (marker && marker.object3D && marker.object3D.visible) {
        video.play().catch(() => {});
      }
    }, { once: true });
  </script>

</body>
</html>
