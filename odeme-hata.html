  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(196, 152, 106, 0.08);
      border: 1px solid rgba(196, 152, 106, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon svg { width: 28px; height: 28px; }
    .label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #C4986A;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 14px;
    }
    p {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .actions { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .btn {
      display: inline-block;
      padding: 13px 32px;
      border-radius: 100px;
      background: #C4986A;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-decoration: none;
      transition: background .2s;
      width: 100%;
      max-width: 280px;
    }
    .btn:hover { background: #d8b080; }
    .btn-ghost {
      display: inline-block;
      padding: 11px 32px;
      border-radius: 100px;
      border: 0.5px solid rgba(196,152,106,0.35);
      color: rgba(255,255,255,0.55);
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color .2s, color .2s;
      width: 100%;
      max-width: 280px;
    }
    .btn-ghost:hover { border-color: #C4986A; color: #C4986A; }
    .divider {
      width: 48px;
      height: 1px;
      background: rgba(196,152,106,0.2);
      margin: 36px auto 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 9v4m0 4h.01M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9z" stroke="#C4986A" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="label">Ödeme</div>
    <h1>Ödeme Tamamlanamadı</h1>
    <p>Lütfen tekrar deneyin veya destek ile iletişime geçin.</p>
    <div class="actions">
      <a href="/" class="btn">Tekrar Dene</a>
      <a href="mailto:info@cha0sar.com" class="btn-ghost">Destek →</a>
    </div>
    <div class="divider"></div>
  </div>
</body>
</html>
